# Configuration of Hugo
# Guide: https://wowchemy.com/docs/getting-started/
# Hugo Documentation: https://gohugo.io/getting-started/configuration/#all-configuration-settings
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

title: pinoy links # Website name
baseURL: 'https://pinoylinks.github.io/' # Website URL

############################
## PAGE OPTIONS
############################

cascade:
  # Bookmarks post options
  - _target:
      path: /bookmarks/**
    editable: false
    reading_time: false
    commentable: false
    show_related: true
    pager: true
    show_breadcrumb: false
  # Notes post options
  - _target:
      path: /notes/**
    editable: false
    reading_time: true
    commentable: true
    show_related: true
    pager: true
    show_breadcrumb: false
  # ZK post options
  - _target:
      path: /zk/**
    editable: false
    reading_time: true
    commentable: true
    show_related: true
    pager: true
    show_breadcrumb: false
  # Notebooks folder options
  - _target:
      path: /notebooks/**
    editable: false
    show_breadcrumb: true

############################
## LANGUAGE
############################

defaultContentLanguage: en
hasCJKLanguage: false
defaultContentLanguageInSubdir: false
removePathAccents: true

############################
## MODULES
############################

module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-plugin-decap-cms
    - path: github.com/wowchemy/wowchemy-hugo-themes/modules/wowchemy-plugin-netlify
    - path: github.com/wowchemy/wowchemy-hugo-themes/modules/wowchemy-plugin-reveal
    - path: github.com/wowchemy/wowchemy-hugo-themes/modules/wowchemy/v5
    - path: github.com/rodrigoalcarazdelaosa/wowchemy-shortcode-lottie

############################
## ADVANCED
############################

enableGitInfo: false
summaryLength: 30
paginate: 10
enableEmoji: true
enableRobotsTXT: true
footnotereturnlinkcontents: <sup>^</sup>
ignoreFiles: [\.ipynb$, .ipynb_checkpoints$, \.Rmd$, \.Rmarkdown$, _cache$]
permalinks:
  event: '/talk/:slug/'
  tags: '/tag/:slug/'
  categories: '/category/:slug/'
  publication_types: '/publication-type/:slug/'
  # bookmarks: '/:slug/'
  # notes: '/:slug/'
  # zk: '/:slug/'
disableAliases: true
outputs:
  home: [HTML, RSS, JSON, WebAppManifest, headers, redirects]
  section: [HTML, RSS]
imaging:
  resampleFilter: lanczos
  quality: 75
  anchor: smart
timeout: 600000
taxonomies:
  tag: tags
  category: categories
  publication_type: publication_types
  author: authors
markup:
  _merge: deep
related:
  threshold: 80
  includeNewer: true
  toLower: true
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 70
security:
  _merge: deep
sitemap:
  _merge: deep
minify:
  _merge: deep
