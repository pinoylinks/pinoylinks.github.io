backend:
  name: git-gateway
  branch: main
  squash_merges: true
media_folder: 'assets/media'
public_folder: '/media'
local_backend: true # npx decap-server
collections:
  - name: zettelkasten
    label: Zettelkasten
    label_singular: Zettelkasten
    folder: 'content/zk'
    # path: '{{slug}}/index'
    filter: {field: "cms_exclude"}
    create: true  # Allow users to create new documents in this collection
    fields:  # The fields each document in this collection have
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish this page on", name: "date", widget: "datetime", picker_utc: false, format: "YYYY-MM-DDTHH:mm:ss+08:00"}
      - label: "Draft"
        name: "draft"
        widget: "boolean"
        default: false
        required: false
      - label: "Categories"
        name: "categories"
        widget: "hidden"
        default: "🗂️ ZK"
      - label: "Tags"
        name: "tags"
        required: false
        widget: "list"
      - {label: "Body", name: "body", widget: "markdown"}
  - name: notes
    label: Notes
    label_singular: Notes
    folder: 'content/notes'
    path: '{{slug}}/index'
    filter: {field: "cms_exclude"}
    create: true  # Allow users to create new documents in this collection
    fields:  # The fields each document in this collection have
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Summary", name: "summary", widget: "string", required: false}
      - {label: "Subtitle", name: "subtitle", widget: "string", required: false}
      - {label: "Publish this page on", name: "date", widget: "datetime", picker_utc: false, format: "YYYY-MM-DDTHH:mm:ss+08:00"}
      - {label: "Last updated on", name: "lastmod", widget: "datetime", picker_utc: false, format: "YYYY-MM-DDTHH:mm:ss+08:00"}
      - label: Build
        name: _build
        required: false
        widget: object
        fields:
          - label: "Render"
            name: "render"
            widget: "hidden"
            default: "always"
          - label: "List"
            name: "list"
            widget: "select"
            options: ["always", "never"]
            default: "always"
      - label: "Draft"
        name: "draft"
        widget: "boolean"
        default: false
        required: false
      - label: "Categories"
        name: "categories"
        widget: "hidden"
        default: "📝 Notes"
      - label: "Tags"
        name: "tags"
        required: false
        widget: "list"
      - {label: "Body", name: "body", widget: "markdown"}
      - label: Links
        name: links
        required: false
        widget: list
        fields:
          - {label: Link, name: url, widget: string}
          - {label: Link text, name: name, widget: string, required: false}
          - label: Icon pack
            name: icon_pack
            widget: select
            multiple: false
            required: false
            options:
              - {label: "None", value: ""}
              - {label: "Solid", value: "fas"}
              - {label: "Regular", value: "far"}
              - {label: "Brand", value: "fab"}
              - {label: "Academic", value: "ai"}
          - {label: "Icon (see https://wowchemy.com/docs/page-builder/#icons)", name: icon, widget: string, required: false}
  - name: bookmarks
    label: Bookmarks
    label_singular: Bookmark
    folder: 'content/bookmarks'
    path: '{{slug}}/index'
    filter: {field: "cms_exclude"}
    create: true  # Allow users to create new documents in this collection
    fields:  # The fields each document in this collection have
      - {label: "Title", name: "title", widget: "string"}
      - label: "Show Date"
        name: "show_date"
        widget: "boolean"
        default: false
        required: true
      - {label: "Publish this page on", name: "date", widget: "datetime", picker_utc: false, format: "YYYY-MM-DDTHH:mm:ss+08:00"}
      - {label: "Summary", name: "summary", widget: "string", required: false}
      - label: "Draft"
        name: "draft"
        widget: "boolean"
        default: false
        required: false
      - label: "Categories"
        name: "categories"
        widget: "hidden"
        default: "🔖 Bookmarks"
      - label: "Tags"
        name: "tags"
        required: false
        widget: "list"
      - {label: "External link (optional - replaces link to project page)", name: "external_link", widget: "string", required: false}
      - label: Links
        name: links
        required: false
        widget: list
        fields:
          - {label: Link, name: url, widget: string}
          - {label: Link text, name: name, widget: string, required: false}
          - label: Icon pack
            name: icon_pack
            widget: select
            multiple: false
            required: false
            options:
              - {label: "None", value: ""}
              - {label: "Solid", value: "fas"}
              - {label: "Regular", value: "far"}
              - {label: "Brand", value: "fab"}
              - {label: "Academic", value: "ai"}
          - {label: "Icon (see https://wowchemy.com/docs/page-builder/#icons)", name: icon, widget: string, required: false}
  - name: tags
    label: Tags
    label_singular: Tag
    folder: 'content/tags'
    path: '{{slug}}/_index'
    filter: {field: "cms_exclude"}
    create: true  # Allow users to create new documents in this collection
    fields:  # The fields each document in this collection have
      - {label: "Title (e.g. #html)", name: "title", widget: "string", default: "#"}
      - {label: "Slug (e.g. html)", name: "slug", widget: "string"}
      - {label: "View", name: "view", widget: "number", default: 3}
  - name: pages
    label: "Pages"
    files:
      - file: "content/privacy.md"
        label: "Privacy Policy"
        name: "privacy"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Publish Date", name: "date", widget: "datetime", picker_utc: false, format: "YYYY-MM-DDTHH:mm:ss+08:00"}
          - {label: "Subtitle", name: "subtitle", widget: "string", required: false}
          - {label: "Summary", name: "summary", widget: "string", required: false}
          - label: "Draft"
            name: "draft"
            required: false
            widget: "boolean"
            default: false
          - {label: "Body", name: "body", widget: "markdown"}
      - file: "content/terms.md"
        label: "Terms"
        name: "terms"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Publish Date", name: "date", widget: "datetime", picker_utc: false, format: "YYYY-MM-DDTHH:mm:ss+08:00"}
          - {label: "Subtitle", name: "subtitle", widget: "string", required: false}
          - {label: "Summary", name: "summary", widget: "string", required: false}
          - label: "Draft"
            name: "draft"
            required: false
            widget: "boolean"
            default: false
          - {label: "Body", name: "body", widget: "markdown"}
  - name: on-blogging-notebook
    label: On Blogging Notebook
    label_singular: On Blogging Notebook
    folder: 'content/notebooks/blogging'
    # path: '{{slug}}/index'
    filter: {field: "cms_exclude"}
    create: true  # Allow users to create new documents in this collection
    fields:  # The fields each document in this collection have
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Link Title", name: "linkTitle", widget: "string", default: "Chapter "}
      - {label: "Publish this page on", name: "date", widget: "datetime", picker_utc: false, format: "YYYY-MM-DDTHH:mm:ss+08:00"}
      - {label: "Type", name: "type", widget: "hidden", default: "book"}
      - {label: "Weight", name: "weight", widget: "number", default: 99, value_type: "int", required: false}
      - {label: "Math", name: "math", widget: "boolean", default: false, required: false}
      - {label: "Highlight", name: "highlight", widget: "boolean", default: false, required: false}
      - label: "Draft"
        name: "draft"
        widget: "boolean"
        default: false
        required: false
      - label: "Tags"
        name: "tags"
        widget: "list"
        default: "chapter"
      - {label: "Body", name: "body", widget: "markdown"}
  - name: on-thinking-notebook
